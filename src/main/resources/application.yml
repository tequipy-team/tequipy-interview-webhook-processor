spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/webhooks
    username: webhooks
    password: webhooks
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080

webhook:
  stripe:
    secret: ${STRIPE_WEBHOOK_SECRET}
  trackingmore:
    secret: ${TRACKINGMORE_WEBHOOK_SECRET}
