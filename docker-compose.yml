version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: webhooks
      POSTGRES_PASSWORD: webhooks
      POSTGRES_DB: webhooks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webhooks
    depends_on:
      - postgres

volumes:
  postgres_data:
